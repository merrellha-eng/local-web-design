<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LOCAL WEB DESIGNへのお問い合わせページです。">
  <title>お問い合わせ | LOCAL WEB DESIGN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/style.css?v=20260702-4">
</head>
<body class="sub-page">
  <header class="site-header sub-header">
    <a class="site-logo" href="./index.html" aria-label="LOCAL WEB DESIGN トップページ">
      <img src="./assets/images/logo.webp" alt="" class="logo-mark">
      <span class="site-name">LOCAL WEB DESIGN</span>
    </a>
    <button class="menu-button" type="button" aria-label="メニューを開閉する" aria-controls="global-nav" aria-expanded="false">
      <span class="material-symbols-outlined" aria-hidden="true">menu</span>
    </button>
    <nav class="global-nav" id="global-nav" aria-label="グローバルナビゲーション">
      <a href="./index.html#features">サービスの特徴</a>
      <a href="./index.html#flow">制作の流れ</a>
      <a href="./index.html#portfolio">制作実績</a>
      <a href="./index.html">料金プラン</a>
      <a href="./index.html">よくある質問</a>
      <a class="nav-contact" href="./lp-design-check.html">無料LPデザイン3案</a>
    </nav>
  </header>

  <main>
    <section class="page-hero" aria-labelledby="contact-title">
      <p class="section-kicker">CONTACT</p>
      <h1 id="contact-title">お問い合わせ</h1>
      <p>ホームページ制作についてのご相談は、<br>下記フォームよりお気軽にお問い合わせください。</p>
    </section>

    <section class="contact-section" aria-label="お問い合わせフォーム">
      <!-- TODO: 現在は表示確認用のダミーフォームです。運用開始前に実際のお問い合わせ送信方法を決定し、送信処理を実装してください。 -->
      <form class="contact-form" id="contact-form">
        <label>
          <span>お名前 <em>必須</em></span>
          <input type="text" name="name" autocomplete="name" required>
        </label>
        <label>
          <span>店舗名・事業名</span>
          <input type="text" name="shop" autocomplete="organization">
        </label>
        <label>
          <span>メールアドレス <em>必須</em></span>
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
          <span>電話番号</span>
          <input type="tel" name="tel" autocomplete="tel">
        </label>
        <label class="full-field">
          <span>ご相談内容 <em>必須</em></span>
          <textarea name="message" rows="7" required></textarea>
        </label>
        <label class="privacy-check full-field">
          <input type="checkbox" name="privacy" required>
          <span>個人情報の取り扱いに同意します <em>必須</em></span>
        </label>
        <button class="submit-button full-field" type="submit">送信する</button>
      </form>
      <a class="back-link" href="./index.html">トップページへ戻る</a>
    </section>
  </main>

  <footer class="site-footer">
    <small>&copy; LOCAL WEB DESIGN</small>
  </footer>

  <script src="./assets/js/main.js?v=20260702-1"></script>
</body>
</html>
